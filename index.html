<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cổng Tra Cứu Điểm THCS Nhơn Phú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; }
        .tab-active { border-bottom-width: 3px; border-color: #2563eb; color: #1e40af; font-weight: 700; }
        .tab-inactive { color: #64748b; font-weight: 600; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">

        const { useState, useEffect, useRef } = React;

        // Icons
        const GraduationCap = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.42 10.922a2 2 0 0 0-.019-3.838L12.83 4.18a2 2 0 0 0-1.66 0L2.6 7.08a2 2 0 0 0 0 3.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>);
        const ShieldCheck = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>);
        const User = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);
        const LogOut = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>);
        const FileSpreadsheet = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>);
        const Upload = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>);
        const Trash2 = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
        const Activity = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>);
        const Download = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>);
        
        // CỜ ĐÁNH DẤU MÔI TRƯỜNG DEV: Sẽ tự động biến thành false trong file xuất ra để ẩn nút
        const IS_DEV_ENV = false;

        // ======================================================================
        // BƯỚC 1: ĐIỀN MÃ CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY ĐỂ APP HOẠT ĐỘNG
        // ======================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBzTbPNmG7NKjp7SoLKYDmonWZhYti9PhA",
            authDomain: "thcs-nhon.firebaseapp.com",
            projectId: "thcs-nhon",
            storageBucket: "thcs-nhon.firebasestorage.app",
            messagingSenderId: "324165034057",
            appId: "1:324165034057:web:a784f923d3b78f96b59f98"
        };

        let auth, db;
        try {
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "ĐIỀN_API_KEY_CỦA_BẠN_VÀO_ĐÂY") {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
            }
        } catch(e) { console.warn("Lỗi khởi tạo Firebase", e); }

        const allClassesList = [];
        for (let grade = 6; grade <= 9; grade++) {
            for (let classNum = 1; classNum <= 8; classNum++) {
                allClassesList.push(`${grade}A${classNum}`);
            }
        }

        // Cấu hình chuẩn số cột TX theo Thông tư 22 (Vừa khít không thừa không thiếu)
        const subjectConfig = [
            { name: "Toán học", prefix: "Toan", type: "score", txCount: 4, color: "#D9E1F2" },
            { name: "Ngữ văn", prefix: "Van", type: "score", txCount: 4, color: "#FCE4D6" },
            { name: "Ngoại ngữ", prefix: "NN", type: "score", txCount: 4, color: "#FFF2CC" },
            { name: "Khoa học tự nhiên", prefix: "KHTN", type: "score", txCount: 4, color: "#E2EFDA" },
            { name: "Lịch sử và Địa lí", prefix: "LSDL", type: "score", txCount: 4, color: "#F8CBAD" },
            { name: "GDCD", prefix: "GDCD", type: "score", txCount: 2, color: "#B4C6E7" },
            { name: "Tin học", prefix: "Tin", type: "score", txCount: 2, color: "#FFE699" },
            { name: "Công nghệ", prefix: "CN", type: "score", txCount: 2, color: "#C6E0B4" },
            { name: "Giáo dục thể chất", prefix: "GDTC", type: "passfail", txCount: 3, color: "#EDEDED" },
            { name: "Nghệ thuật", prefix: "NgheThuat", type: "passfail", txCount: 3, color: "#EDEDED" },
            { name: "Hoạt động trải nghiệm", prefix: "HDTN", type: "passfail", txCount: 4, color: "#EDEDED" },
            { name: "Giáo dục địa phương", prefix: "GDDP", type: "passfail", txCount: 2, color: "#EDEDED" }
        ];

        function App() {
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [students, setStudents] = useState([]);
            
            const [activeTab, setActiveTab] = useState('student');
            const [view, setView] = useState('login');
            
            // State Đăng nhập
            const [emailInput, setEmailInput] = useState('');
            const [studentPasswordInput, setStudentPasswordInput] = useState('');
            const [teacherClassInput, setTeacherClassInput] = useState('');
            const [teacherPasswordInput, setTeacherPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');
            
            // State Giáo viên
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            
            // State View Mode
            const [currentStudentData, setCurrentStudentData] = useState(null);
            const [termTab, setTermTab] = useState('HK2'); // Học sinh đang xem học kỳ nào
            const [teacherClass, setTeacherClass] = useState(''); // Giáo viên đang quản lý lớp nào

            useEffect(() => {
                if (auth) {
                    auth.signInAnonymously().catch(e => console.error(e));
                    const unsubscribe = auth.onAuthStateChanged(setFirebaseUser);
                    return () => unsubscribe();
                }
            }, []);

            useEffect(() => {
                if (db && firebaseUser) {
                    const colRef = db.collection('students_data_2025_2026');
                    const unsubscribe = colRef.onSnapshot((snapshot) => {
                        const dataList = [];
                        snapshot.forEach(doc => dataList.push({ id: doc.id, ...doc.data() }));
                        setStudents(dataList);
                    }, (error) => console.error(error));
                    return () => unsubscribe();
                }
            }, [firebaseUser]);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoginError('');

                if (!db) {
                    setLoginError('HỆ THỐNG ĐÃ KHOÁ. Vui lòng kết nối Cơ sở dữ liệu Firebase ở Bước 1 trong mã nguồn.');
                    return;
                }

                if (activeTab === 'student') {
                    const studentInfo = students.find(s => s.email.toLowerCase() === emailInput.toLowerCase());
                    if (studentInfo) {
                        if (studentInfo.password === studentPasswordInput) {
                            setCurrentStudentData(studentInfo);
                            setTermTab('HK2');
                            setView('student_view');
                        } else {
                            setLoginError('Mật khẩu không chính xác!');
                        }
                    } else {
                        setLoginError('Không tìm thấy dữ liệu học sinh này trên hệ thống!');
                    }
                } else {
                    const formattedClass = teacherClassInput.trim().toUpperCase();
                    if (!allClassesList.includes(formattedClass)) {
                        setLoginError('Tên lớp không hợp lệ (Ví dụ hợp lệ: 6A1, 9A8)');
                        return;
                    }
                    if (teacherPasswordInput === '456789') {
                        setTeacherClass(formattedClass);
                        setView('admin_view');
                    } else {
                        setLoginError('Mật khẩu Giáo viên không chính xác!');
                    }
                }
            };

            const handleLogout = () => {
                setView('login');
                setCurrentStudentData(null);
                setTeacherClass('');
                setEmailInput('');
                setStudentPasswordInput('');
                setTeacherPasswordInput('');
            };

            // ----- XUẤT SOURCE CODE HTML ĐỂ UP HOST -----
            const downloadAppSource = () => {
                const scriptElement = document.querySelector('script[type="text/babel"]');
                let reactCode = scriptElement ? scriptElement.textContent : "";
                
                // Tự động TẮT cờ IS_DEV_ENV thành false trong file xuất ra để ẩn nút
                reactCode = reactCode.replace('const IS_DEV_ENV = true;', 'const IS_DEV_ENV = false;');
                
                const htmlTemplate = `<!DOCTYPE html>\n<html lang="vi">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">\n    <title>Cổng Tra Cứu Điểm THCS Nhơn Phú</title>\n    <script src="https://cdn.tailwindcss.com"><\/script>\n    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin><\/script>\n    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin><\/script>\n    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"><\/script>\n    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"><\/script>\n    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"><\/script>\n    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"><\/script>\n    <style>\n        ::-webkit-scrollbar { width: 6px; height: 6px; }\n        ::-webkit-scrollbar-track { background: transparent; }\n        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }\n        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }\n        * { -webkit-tap-highlight-color: transparent; }\n        body { background-color: #f8fafc; }\n        .tab-active { border-bottom-width: 3px; border-color: #2563eb; color: #1e40af; font-weight: 700; }\n        .tab-inactive { color: #64748b; font-weight: 600; }\n    </style>\n</head>\n<body>\n    <div id="root"></div>\n    <script type="text/babel">\n${reactCode}\n    <\/script>\n</body>\n</html>`;

                const blob = new Blob([htmlTemplate], { type: 'text/html;charset=utf-8' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "index.html";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // ----- THUẬT TOÁN ĐIỂM SỐ TT22 -----
            const parseNumberOrEmpty = (val) => {
                if (val === undefined || val === null) return undefined;
                const s = String(val).trim();
                if (s === '') return undefined;
                const n = Number(s);
                return isNaN(n) ? undefined : n;
            };

            const calculateTBM = (txs, gk, ck) => {
                if (gk === undefined || ck === undefined || gk === '' || ck === '') return null;
                const sumTX = txs.reduce((a, b) => a + b, 0);
                const totalWeight = txs.length + 5; 
                const tbm = (sumTX + Number(gk)*2 + Number(ck)*3) / totalWeight;
                return Math.round(tbm * 10) / 10;
            };

            const evaluateStudent = (grades, conductInput) => {
                const conduct = (conductInput || "Chưa xét").trim();
                const validGrades = grades.filter(g => g.tbm !== null && g.tbm !== undefined && g.tbm !== "");
                
                if (validGrades.length === 0) return { result: "Chưa xét", conduct: conduct, title: "Không" };

                const scoredGrades = validGrades.filter(g => typeof g.tbm === 'number');
                const commentGrades = validGrades.filter(g => typeof g.tbm === 'string');

                const tbms = scoredGrades.map(g => g.tbm);
                const comments = commentGrades.map(g => g.tbm.toUpperCase());

                const isAllCommentsPass = (comments.length === 0) || comments.every(c => c === 'Đ');
                const countCommentFail = comments.filter(c => c === 'CĐ').length;

                const countTBMGTE8 = tbms.filter(t => t >= 8.0).length;
                const countTBMGTE65 = tbms.filter(t => t >= 6.5).length;
                const countTBMGTE5 = tbms.filter(t => t >= 5.0).length;
                const minTBM = tbms.length > 0 ? Math.min(...tbms) : 0;

                let result = "Chưa đạt";
                let title = "Không";

                if (isAllCommentsPass && tbms.every(t => t >= 6.5) && countTBMGTE8 >= 6) result = "Tốt";
                else if (isAllCommentsPass && tbms.every(t => t >= 5.0) && countTBMGTE65 >= 6) result = "Khá";
                else if (countCommentFail <= 1 && countTBMGTE5 >= 6 && minTBM >= 3.5) result = "Đạt";

                if (conduct.toLowerCase() === 'tốt' && result === 'Tốt') {
                    const countTBMGTE9 = tbms.filter(t => t >= 9.0).length;
                    title = countTBMGTE9 >= 6 ? "Học sinh Xuất sắc" : "Học sinh Giỏi";
                }
                return { result, conduct, title };
            };

            // ----- XUẤT FILE EXCEL THEO LỚP ĐƯỢC CHỈ ĐỊNH -----
            const downloadTemplate = async () => {
                try {
                    setIsUploading(true);
                    const workbook = new window.ExcelJS.Workbook();
                    
                    const createSheet = (sheetName) => {
                        const sheet = workbook.addWorksheet(sheetName, { views: [{ state: 'frozen', xSplit: 5, ySplit: 1 }] });
                        
                        let columns = [
                            { header: 'MaHS', key: 'mahs', width: 12 },
                            { header: 'Email', key: 'email', width: 25 },
                            { header: 'MatKhau', key: 'matkhau', width: 12 },
                            { header: 'HoTen', key: 'hoten', width: 28 },
                            { header: 'HanhKiem', key: 'hanhkiem', width: 12 }
                        ];

                        subjectConfig.forEach(subj => {
                            for(let i=1; i<=subj.txCount; i++) columns.push({ header: `${subj.prefix}_TX${i}`, width: 6 });
                            columns.push({ header: `${subj.prefix}_GK`, width: 6 });
                            columns.push({ header: `${subj.prefix}_CK`, width: 6 });
                        });

                        sheet.columns = columns;
                        const headerRow = sheet.getRow(1);
                        headerRow.font = { bold: true };
                        headerRow.alignment = { horizontal: 'center', vertical: 'middle' };
                        headerRow.height = 30;

                        for(let i = 1; i <= 5; i++) headerRow.getCell(i).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD0CECE' } };
                        
                        let colIdx = 6;
                        subjectConfig.forEach(subj => {
                            const argbColor = subj.color.replace('#', 'FF'); 
                            for(let i = 0; i < subj.txCount + 2; i++) {
                                headerRow.getCell(colIdx).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: argbColor } };
                                colIdx++;
                            }
                        });

                        // Tạo 1 dòng mẫu ứng với lớp của giáo viên này
                        const sampleData = ["HS001", "hs1@nhonphu.edu.vn", "123456", "Học Sinh Mẫu", "Tốt"];
                        // Đổ dữ liệu rỗng cho khớp số cột điểm
                        subjectConfig.forEach(subj => {
                            for(let i=0; i<subj.txCount + 2; i++) sampleData.push("");
                        });
                        
                        const row = sheet.addRow(sampleData);
                        let dColIdx = 6;
                        subjectConfig.forEach(subj => {
                            const argbColor = subj.color.replace('#', 'FF');
                            for(let i = 0; i < subj.txCount + 2; i++) {
                                row.getCell(dColIdx).alignment = { horizontal: 'center' };
                                row.getCell(dColIdx).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: argbColor } };
                                dColIdx++;
                            }
                        });
                    };

                    createSheet('HK I');
                    createSheet('HK II');

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `Nhap_Diem_Lop_${teacherClass}.xlsx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    console.error(error);
                    alert("Lỗi tạo file.");
                } finally {
                    setIsUploading(false);
                }
            };

            // ----- ĐỌC FILE EXCEL & TÍNH ĐIỂM CẢ NĂM -----
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);

                try {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        try {
                            const buffer = event.target.result;
                            const workbook = new window.ExcelJS.Workbook();
                            await workbook.xlsx.load(buffer);
                            
                            const parseSheet = (sheetName) => {
                                const worksheet = workbook.getWorksheet(sheetName);
                                if (!worksheet) return [];
                                const parsedRows = [];
                                worksheet.eachRow((row) => {
                                    const rowData = [];
                                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                                        let val = cell.value;
                                        if (val && typeof val === 'object') {
                                            if (val.richText) val = val.richText.map(rt => rt.text).join('');
                                            else if (val.result !== undefined) val = val.result;
                                        }
                                        rowData[colNumber - 1] = val ?? "";
                                    });
                                    parsedRows.push(rowData);
                                });
                                
                                const termData = {};
                                for (let i = 1; i < parsedRows.length; i++) {
                                    const row = parsedRows[i];
                                    if (!row || row.length < 3 || String(row[0]).trim() === "") continue; 
                                    
                                    const studentId = String(row[0]).trim();
                                    const conduct = String(row[4] || "");
                                    let grades = [];
                                    
                                    let colIdx = 5;
                                    subjectConfig.forEach(subj => {
                                        let tx = [];
                                        for(let j=0; j<subj.txCount; j++) {
                                            let v = row[colIdx++];
                                            if(subj.type==='score') v = parseNumberOrEmpty(v);
                                            else if(v) v = String(v).trim().toUpperCase();
                                            if(v !== undefined && v !== "") tx.push(v);
                                        }
                                        let gk = row[colIdx++];
                                        let ck = row[colIdx++];
                                        if(subj.type==='score') { gk = parseNumberOrEmpty(gk); ck = parseNumberOrEmpty(ck); }
                                        else { if(gk) gk = String(gk).trim().toUpperCase(); if(ck) ck = String(ck).trim().toUpperCase(); }
                                        
                                        let tbm = null;
                                        if (subj.type === 'score') {
                                            tbm = calculateTBM(tx, gk, ck);
                                        } else {
                                            tbm = ck ? ck : null; // Môn đánh giá lấy điểm CK làm TBM
                                        }
                                        
                                        grades.push({ subject: subj.name, tx, gk: gk!=null?gk:"", ck: ck!=null?ck:"", tbm, type: subj.type });
                                    });

                                    const summary = evaluateStudent(grades, conduct);
                                    termData[studentId] = {
                                        email: String(row[1] || "").trim(),
                                        password: String(row[2] || "").trim(),
                                        name: String(row[3] || "").trim(),
                                        conduct: conduct,
                                        grades: grades,
                                        summary: summary
                                    };
                                }
                                return termData;
                            };

                            const hk1Data = parseSheet('HK I');
                            const hk2Data = parseSheet('HK II');
                            
                            // Gộp HK1, HK2 và Tính Cả Năm
                            const newStudents = [];
                            const allStudentIds = new Set([...Object.keys(hk1Data), ...Object.keys(hk2Data)]);

                            allStudentIds.forEach(id => {
                                const d1 = hk1Data[id];
                                const d2 = hk2Data[id];
                                const baseInfo = d2 || d1; // Ưu tiên thông tin ở sheet HK2 nếu có
                                
                                // Bắt buộc học sinh up lên phải thuộc lớp của giáo viên đang quản lý
                                if (!baseInfo) return;

                                // Tính Cả Năm
                                let cnGrades = [];
                                subjectConfig.forEach(subj => {
                                    let g1 = d1 ? d1.grades.find(g => g.subject === subj.name) : null;
                                    let g2 = d2 ? d2.grades.find(g => g.subject === subj.name) : null;
                                    
                                    let tbm_cn = null;
                                    if (subj.type === 'score') {
                                        if (g1 && g1.tbm !== null && g2 && g2.tbm !== null) {
                                            tbm_cn = Math.round(((g1.tbm + g2.tbm * 2) / 3) * 10) / 10;
                                        }
                                    } else {
                                        // Môn Đánh giá: Nếu HK2 Đạt thì Cả năm Đạt
                                        if (g2 && g2.ck === 'Đ') tbm_cn = 'Đ';
                                        else if (g2 && g2.ck === 'CĐ') tbm_cn = 'CĐ';
                                    }
                                    cnGrades.push({ subject: subj.name, tx: [], gk: "", ck: "", tbm: tbm_cn, type: subj.type });
                                });

                                const cnConduct = d2 ? d2.conduct : (d1 ? d1.conduct : "");
                                const cnSummary = evaluateStudent(cnGrades, cnConduct);

                                newStudents.push({
                                    id: id, email: baseInfo.email, password: baseInfo.password, name: baseInfo.name, class: teacherClass,
                                    schoolYear: "2025 - 2026",
                                    hk1: d1 ? { conduct: d1.conduct, grades: d1.grades, summary: d1.summary } : null,
                                    hk2: d2 ? { conduct: d2.conduct, grades: d2.grades, summary: d2.summary } : null,
                                    cn: { conduct: cnConduct, grades: cnGrades, summary: cnSummary }
                                });
                            });

                            if (newStudents.length === 0) { alert("File không có dữ liệu hoặc tên Sheet không đúng (Yêu cầu sheet tên 'HK I' và 'HK II')."); setIsUploading(false); return; }

                            const colRef = db.collection('students_data_2025_2026');
                            for (const student of newStudents) {
                                await colRef.doc(`${teacherClass}_${student.id}`).set(student);
                            }
                            
                            alert(`Hoàn tất cập nhật ${newStudents.length} học sinh cho lớp ${teacherClass}.`);
                        } catch (error) {
                            alert("Lỗi đọc file Excel."); console.error(error);
                        } finally {
                            setIsUploading(false);
                            if (fileInputRef.current) fileInputRef.current.value = '';
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    alert("Lỗi thư viện."); setIsUploading(false);
                }
            };

            const handleDeleteStudent = async (docId) => {
                if (window.confirm('Bạn có chắc chắn muốn xóa học sinh này khỏi hệ thống?')) {
                    await db.collection('students_data_2025_2026').doc(docId).delete();
                }
            };

            // Giáo viên chỉ thấy học sinh lớp mình
            const myClassStudents = students.filter(s => s.class === teacherClass);

            // ----- GIAO DIỆN ĐĂNG NHẬP -----
            if (view === 'login') {
                return (
                    <div className="min-h-[100dvh] bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
                        <div className="max-w-md w-full bg-white sm:rounded-3xl rounded-2xl shadow-xl p-6 sm:p-8 border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg"><GraduationCap size={32} className="text-white" /></div>
                                <h1 className="text-2xl font-bold text-slate-900">THCS Nhơn Phú</h1>
                                <p className="text-slate-500 mt-1">Hệ thống Quản lý & Tra cứu Điểm</p>
                            </div>
                            <div className="flex p-1 bg-slate-100 rounded-2xl mb-8">
                                <button onClick={() => { setActiveTab('student'); setLoginError(''); }} className={`flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all ${activeTab === 'student' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>Học Sinh</button>
                                <button onClick={() => { setActiveTab('teacher'); setLoginError(''); }} className={`flex-1 py-2.5 text-sm font-semibold rounded-xl flex justify-center items-center gap-1 transition-all ${activeTab === 'teacher' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>Giáo Viên <ShieldCheck size={14} /></button>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                {activeTab === 'student' ? (
                                    <>
                                        <div className="relative">
                                            <div className="absolute left-4 top-3.5 text-slate-400"><User size={18} /></div>
                                            <input type="email" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Email học sinh" required />
                                        </div>
                                        <div className="relative mt-4">
                                            <div className="absolute left-4 top-3.5 text-slate-400"><ShieldCheck size={18} /></div>
                                            <input type="password" value={studentPasswordInput} onChange={(e) => setStudentPasswordInput(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Mật khẩu tra cứu" required />
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="relative">
                                            <div className="absolute left-4 top-3.5 text-slate-400"><User size={18} /></div>
                                            <input type="text" value={teacherClassInput} onChange={(e) => setTeacherClassInput(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all uppercase" placeholder="Tên đăng nhập (Ví dụ: 6A1)" required />
                                        </div>
                                        <div className="relative mt-4">
                                            <div className="absolute left-4 top-3.5 text-slate-400"><ShieldCheck size={18} /></div>
                                            <input type="password" value={teacherPasswordInput} onChange={(e) => setTeacherPasswordInput(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Mật khẩu Giáo viên" required />
                                        </div>
                                    </>
                                )}
                                {loginError && <p className="text-sm text-red-500 font-medium ml-1 bg-red-50 p-2 rounded-lg">{loginError}</p>}
                                <button type="submit" className="w-full py-3.5 text-white bg-blue-600 hover:bg-blue-700 rounded-2xl font-semibold transition-all shadow-md active:scale-95">
                                    {activeTab === 'student' ? 'Tra Cứu Điểm' : 'Quản Lý Lớp'}
                                </button>
                            </form>
                            
                            <div className="mt-8 text-center border-t border-slate-100 pt-6">
                                {/* HIỂN THỊ NÚT XUẤT SOURCE CODE NẾU ĐANG Ở TRÊN CANVAS */}
                                {IS_DEV_ENV ? (
                                    <button type="button" onClick={downloadAppSource} className="text-sm text-slate-500 hover:text-blue-600 font-medium transition-colors flex items-center justify-center w-full gap-2 p-2 rounded-xl hover:bg-slate-50 mb-4">
                                        <Download size={16} /> Tải Mã Nguồn (index.html) để Up Host
                                    </button>
                                ) : null}
                                <div className="text-xs text-slate-400 font-medium">Bản quyền thuộc trường THCS Nhơn Phú - Năm 2025</div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ----- GIAO DIỆN GIÁO VIÊN -----
            if (view === 'admin_view') {
                return (
                    <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-0 sm:pb-12">
                        <header className="bg-slate-900 text-white h-16 flex items-center px-4 sm:px-6 justify-between sticky top-0 z-50 shadow-md">
                            <div className="font-bold flex items-center gap-2">
                                <ShieldCheck className="text-blue-400" size={24} />
                                <span className="hidden sm:inline">Portal Giáo Viên - Lớp {teacherClass}</span><span className="sm:hidden">Lớp {teacherClass}</span>
                            </div>
                            <button onClick={handleLogout} className="text-sm bg-white/10 px-3 py-2 rounded-xl flex items-center gap-2 hover:bg-white/20 transition-colors"><LogOut size={16} /> Thoát</button>
                        </header>
                        <main className="max-w-6xl mx-auto px-0 sm:px-4 mt-0 sm:mt-8">
                            <div className="p-4 sm:p-0 flex flex-col md:flex-row justify-between items-start md:items-center mb-0 sm:mb-6 gap-4 bg-white sm:bg-transparent border-b sm:border-none">
                                <div>
                                    <h2 className="text-xl sm:text-2xl font-bold">Danh sách học sinh lớp {teacherClass}</h2>
                                    <p className="text-slate-500 text-xs sm:text-sm mt-1">Dữ liệu được quản lý bảo mật theo từng lớp.</p>
                                </div>
                                <div className="flex flex-col sm:flex-row w-full sm:w-auto gap-2">
                                    <button onClick={downloadTemplate} disabled={isUploading} className="w-full sm:w-auto px-4 py-2.5 hover:bg-slate-200 border flex items-center justify-center gap-2 transition-colors text-slate-700 rounded-xl font-bold bg-white shadow-sm min-w-[130px]">
                                        <FileSpreadsheet size={16} /> {isUploading ? 'Đang xử lý...' : 'Tải File Mẫu (Đủ môn)'}
                                    </button>
                                    <input type="file" accept=".xlsx" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                    <button onClick={() => fileInputRef.current?.click()} disabled={isUploading} className="w-full sm:w-auto justify-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm transition-colors active:scale-95"><Upload size={16} /> Cập Nhật Điểm Lên Hệ Thống</button>
                                </div>
                            </div>

                            <div className="bg-white sm:rounded-3xl shadow-sm border-b sm:border border-slate-200 overflow-hidden">
                                <div className="overflow-x-auto w-full">
                                    <table className="w-full text-left whitespace-nowrap">
                                        <thead className="bg-slate-50">
                                            <tr>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">Mã HS / Mật khẩu</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">Họ Tên / Email</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider text-center">HK I</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider text-center">HK II</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider text-center">Cả Năm</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">Danh hiệu</th>
                                                <th className="p-3 sm:p-4"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {myClassStudents.map(s => (
                                                <tr key={s.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-3 sm:p-4">
                                                        <div className="font-bold text-slate-800 text-sm">{s.id}</div>
                                                        <div className="text-[10px] sm:text-xs text-slate-400 font-mono">Pass: {s.password}</div>
                                                    </td>
                                                    <td className="p-3 sm:p-4">
                                                        <div className="font-semibold text-slate-800 text-sm">{s.name}</div>
                                                        <div className="text-[10px] sm:text-xs text-slate-400">{s.email}</div>
                                                    </td>
                                                    <td className="p-3 sm:p-4 text-center text-sm font-medium text-slate-600">{s.hk1?.summary?.result || '-'}</td>
                                                    <td className="p-3 sm:p-4 text-center text-sm font-medium text-slate-600">{s.hk2?.summary?.result || '-'}</td>
                                                    <td className="p-3 sm:p-4 font-bold text-blue-600 text-center text-sm bg-blue-50/20">{s.cn.summary.result}</td>
                                                    <td className="p-3 sm:p-4 text-sm text-amber-600 font-bold">{s.cn.summary.title}</td>
                                                    <td className="p-3 sm:p-4 text-right">
                                                        <button onClick={() => handleDeleteStudent(`${teacherClass}_${s.id}`)} className="text-slate-400 p-2 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18}/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {myClassStudents.length === 0 && (
                                                <tr><td colSpan="7" className="p-8 text-center text-slate-500">Lớp {teacherClass} chưa có dữ liệu. Vui lòng Tải File Mẫu và điền điểm để cập nhật.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // ----- GIAO DIỆN HỌC SINH -----
            const user = currentStudentData;
            // Xác định dữ liệu đang hiển thị dựa vào tab đang chọn
            const displayData = termTab === 'HK1' ? user.hk1 : (termTab === 'HK2' ? user.hk2 : user.cn);

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-0 sm:pb-12">
                    <header className="bg-white shadow-sm h-16 flex items-center px-4 sm:px-6 justify-between sticky top-0 z-50">
                        <div className="font-bold flex items-center gap-2"><GraduationCap className="text-blue-600" size={24}/><span className="text-lg">THCS Nhơn Phú</span></div>
                        <button onClick={handleLogout} className="text-sm font-bold text-slate-500 hover:text-red-500 flex items-center gap-2 transition-colors bg-slate-50 px-3 py-1.5 rounded-full border"><LogOut size={16} /> <span className="hidden sm:inline">Đăng xuất</span></button>
                    </header>
                    <main className="max-w-5xl mx-auto px-0 sm:px-4 mt-0 sm:mt-8">
                        <div className="bg-white sm:rounded-3xl p-5 sm:p-8 shadow-sm border-b sm:border border-slate-200 mb-2 sm:mb-6 flex flex-col md:flex-row gap-5 items-start md:items-center justify-between">
                            <div className="flex items-center gap-4 w-full">
                                <div className="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-md shrink-0 border-2 border-white">{user.name.charAt(0)}</div>
                                <div className="flex-1">
                                    <h2 className="text-xl sm:text-3xl font-bold mb-1 leading-tight text-slate-900">{user.name}</h2>
                                    <p className="text-slate-500 text-xs sm:text-sm font-semibold flex items-center gap-1.5 flex-wrap">
                                        <span className="bg-slate-100 px-2 py-0.5 rounded flex items-center gap-1"><User size={12}/> Lớp: {user.class}</span> 
                                        <span className="bg-slate-100 px-2 py-0.5 rounded">Năm: 2025-2026</span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* --- TAB CHỌN KỲ HỌC --- */}
                        <div className="flex bg-white px-4 sm:px-6 border-b border-slate-200 shadow-sm sm:rounded-t-3xl">
                            <button onClick={()=>setTermTab('HK1')} className={`flex-1 py-4 text-center cursor-pointer transition-colors ${termTab==='HK1'?'tab-active':'tab-inactive hover:bg-slate-50'}`}>HỌC KỲ I</button>
                            <button onClick={()=>setTermTab('HK2')} className={`flex-1 py-4 text-center cursor-pointer transition-colors ${termTab==='HK2'?'tab-active':'tab-inactive hover:bg-slate-50'}`}>HỌC KỲ II</button>
                            <button onClick={()=>setTermTab('CN')} className={`flex-1 py-4 text-center cursor-pointer transition-colors ${termTab==='CN'?'tab-active':'tab-inactive hover:bg-slate-50'}`}>CẢ NĂM</button>
                        </div>
                        
                        {!displayData ? (
                            <div className="bg-white p-8 text-center text-slate-500 font-medium sm:rounded-b-3xl border-b sm:border border-slate-200">
                                Chưa có dữ liệu điểm cho {termTab === 'HK1' ? 'Học kỳ I' : (termTab === 'HK2' ? 'Học kỳ II' : 'Cả Năm')}.
                            </div>
                        ) : (
                            <div className="bg-white sm:rounded-b-3xl shadow-sm border-b sm:border border-t-0 border-slate-200 overflow-hidden">
                                
                                {/* Tổng kết */}
                                <div className="grid grid-cols-3 gap-0 border-b border-slate-100">
                                    <div className="bg-slate-50 p-4 border-r border-slate-100 text-center">
                                        <p className="text-[10px] text-slate-500 font-bold mb-0.5 uppercase">Rèn luyện</p>
                                        <p className="text-base sm:text-xl font-bold text-slate-800">{displayData.conduct || '-'}</p>
                                    </div>
                                    <div className="bg-blue-50/50 p-4 border-r border-slate-100 text-center">
                                        <p className="text-[10px] text-blue-600 font-bold mb-0.5 uppercase">Học tập</p>
                                        <p className="text-base sm:text-xl font-bold text-blue-700">{displayData.summary.result}</p>
                                    </div>
                                    <div className="bg-amber-50/50 p-4 text-center flex flex-col justify-center">
                                        <p className="text-[10px] text-amber-600 font-bold mb-0.5 uppercase">Danh hiệu</p>
                                        <p className="text-sm font-bold text-amber-700 leading-tight">{displayData.summary.title}</p>
                                    </div>
                                </div>

                                <div className="p-3 border-b bg-slate-50/80 flex items-center gap-2">
                                    <Activity className="text-blue-600" size={18}/>
                                    <span className="font-bold text-slate-800 text-sm">Bảng điểm chi tiết ({termTab})</span>
                                </div>
                                <div className="overflow-x-auto w-full">
                                    <table className="w-full text-left whitespace-nowrap">
                                        <thead className="bg-white border-b border-slate-100">
                                            <tr>
                                                <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase">Môn học</th>
                                                {termTab !== 'CN' && (
                                                    <>
                                                        <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase">Đ.Thường xuyên</th>
                                                        <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase text-center">G.Kỳ</th>
                                                        <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase text-center">C.Kỳ</th>
                                                    </>
                                                )}
                                                <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-blue-600 uppercase text-center bg-blue-50/50">TBM</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {displayData.grades?.map((g, i) => (
                                                <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="p-3 sm:p-4 font-bold text-xs sm:text-sm text-slate-800">{g.subject}</td>
                                                    {termTab !== 'CN' && (
                                                        <>
                                                            <td className="p-3 sm:p-4">
                                                                <div className="flex flex-wrap gap-1">
                                                                    {g.tx?.map((sc, idx) => <span key={idx} className="px-1.5 py-0.5 bg-slate-100 text-slate-700 rounded text-xs sm:text-sm font-bold border border-slate-200/50">{sc}</span>)}
                                                                </div>
                                                            </td>
                                                            <td className="p-3 sm:p-4 text-center text-xs sm:text-sm font-bold text-slate-700">{g.gk}</td>
                                                            <td className="p-3 sm:p-4 text-center text-xs sm:text-sm font-bold text-slate-700">{g.ck}</td>
                                                        </>
                                                    )}
                                                    <td className={`p-3 sm:p-4 text-center text-xs sm:text-sm font-black bg-blue-50/30 ${g.tbm === 'Đ' ? 'text-emerald-600' : g.tbm === 'CĐ' ? 'text-red-500' : 'text-blue-700'}`}>
                                                        {g.tbm !== null ? g.tbm : '-'}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-3 text-[10px] sm:text-xs text-slate-400 text-center border-t border-slate-100 bg-slate-50 uppercase font-semibold tracking-wide">
                                    Đánh giá theo Thông tư 22/2021/TT-BGDĐT
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
    </script>
</body>
</html>
