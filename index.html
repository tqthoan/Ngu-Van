<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cổng Tra Cứu Điểm THCS Nhơn Phú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">

        const { useState, useEffect, useRef } = React;

        // Các Icon được nhúng trực tiếp để đảm bảo KHÔNG BẢO GIỜ LỖI TRẮNG MÀN HÌNH
        const GraduationCap = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.42 10.922a2 2 0 0 0-.019-3.838L12.83 4.18a2 2 0 0 0-1.66 0L2.6 7.08a2 2 0 0 0 0 3.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>);
        const ShieldCheck = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>);
        const User = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);
        const LogOut = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>);
        const FileSpreadsheet = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>);
        const Upload = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>);
        const Trash2 = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
        const Activity = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>);
        const Download = ({ size = 24, className = "" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>);

        // ======================================================================
        // BƯỚC 1: ĐIỀN MÃ CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
        // ======================================================================
        const firebaseConfig = {
            apiKey: "ĐIỀN_API_KEY_CỦA_BẠN_VÀO_ĐÂY",
            authDomain: "ĐIỀN_AUTH_DOMAIN_CỦA_BẠN_VÀO_ĐÂY",
            projectId: "ĐIỀN_PROJECT_ID_CỦA_BẠN_VÀO_ĐÂY",
            storageBucket: "ĐIỀN_STORAGE_BUCKET_CỦA_BẠN_VÀO_ĐÂY",
            messagingSenderId: "ĐIỀN_MESSAGING_SENDER_ID_VÀO_ĐÂY",
            appId: "ĐIỀN_APP_ID_VÀO_ĐÂY"
        };

        // Khởi tạo Firebase
        let auth, db;
        try {
            // Kiểm tra xem người dùng đã thay mã chưa
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "ĐIỀN_API_KEY_CỦA_BẠN_VÀO_ĐÂY") {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
            }
        } catch(e) {
            console.warn("Lỗi khởi tạo Firebase", e);
        }

        const allClassesList = [];
        for (let grade = 6; grade <= 9; grade++) {
            for (let classNum = 1; classNum <= 8; classNum++) {
                allClassesList.push(`${grade}A${classNum}`);
            }
        }

        const subjectConfig = [
            { name: "Toán học", prefix: "Toan", startCol: 6, color: "#D9E1F2" },
            { name: "Ngữ văn", prefix: "Van", startCol: 13, color: "#FCE4D6" },
            { name: "Ngoại ngữ", prefix: "NN", startCol: 20, color: "#FFF2CC" },
            { name: "Khoa học tự nhiên", prefix: "KHTN", startCol: 27, color: "#E2EFDA" },
            { name: "Lịch sử và Địa lí", prefix: "LSDL", startCol: 34, color: "#F8CBAD" },
            { name: "GDCD", prefix: "GDCD", startCol: 41, color: "#B4C6E7" },
            { name: "Tin học", prefix: "Tin", startCol: 48, color: "#FFE699" },
            { name: "Công nghệ", prefix: "CN", startCol: 55, color: "#C6E0B4" }
        ];

        function App() {
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [activeTab, setActiveTab] = useState('student');
            const [view, setView] = useState('login');
            const [emailInput, setEmailInput] = useState('');
            const [studentPasswordInput, setStudentPasswordInput] = useState('');
            const [pinInput, setPinInput] = useState('');
            const [loginError, setLoginError] = useState('');
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            const [currentStudentData, setCurrentStudentData] = useState(null);
            const [selectedClass, setSelectedClass] = useState('Tất cả');
            const [templateClass, setTemplateClass] = useState('6A1'); 

            // Kết nối dữ liệu Firebase hoặc dùng LocalStorage (Demo Mode)
            useEffect(() => {
                if (auth) {
                    auth.signInAnonymously().catch(e => console.error(e));
                    const unsubscribe = auth.onAuthStateChanged(setFirebaseUser);
                    return () => unsubscribe();
                }
            }, []);

            useEffect(() => {
                if (db) {
                    if (!firebaseUser) return;
                    const colRef = db.collection('students_data_2025');
                    const unsubscribe = colRef.onSnapshot((snapshot) => {
                        const dataList = [];
                        snapshot.forEach(doc => dataList.push({ id: doc.id, ...doc.data() }));
                        setStudents(dataList);
                    }, (error) => console.error(error));
                    return () => unsubscribe();
                } else {
                    // CHẾ ĐỘ DEMO (OFFLINE): Tự động load dữ liệu từ bộ nhớ trình duyệt
                    try {
                        const localData = localStorage.getItem('thcs_nhonphu_data');
                        if (localData) {
                            setStudents(JSON.parse(localData) || []);
                        }
                    } catch (e) {
                        console.error(e);
                        setStudents([]);
                    }
                }
            }, [firebaseUser]);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoginError('');

                if (activeTab === 'student') {
                    const studentInfo = students.find(s => s.email.toLowerCase() === emailInput.toLowerCase());
                    if (studentInfo) {
                        if (studentInfo.password === studentPasswordInput) {
                            setCurrentStudentData(studentInfo);
                            setView('student_view');
                        } else {
                            setLoginError('Mật khẩu không chính xác!');
                        }
                    } else {
                        setLoginError('Không tìm thấy học sinh. Hãy báo Giáo viên tải điểm lên trước!');
                    }
                } else {
                    if (pinInput === '123456') setView('admin_view');
                    else setLoginError('Mã PIN không chính xác (Thử: 123456)');
                }
            };

            const handleLogout = () => {
                setView('login');
                setCurrentStudentData(null);
                setEmailInput('');
                setStudentPasswordInput('');
                setPinInput('');
            };

            const downloadAppSource = () => {
                const scriptElement = document.querySelector('script[type="text/babel"]');
                const reactCode = scriptElement ? scriptElement.textContent : "";
                
                const htmlTemplate = `<!DOCTYPE html>\n<html lang="vi">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">\n    <title>Cổng Tra Cứu Điểm THCS Nhơn Phú</title>\n    <script src="https://cdn.tailwindcss.com"><\/script>\n    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin><\/script>\n    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin><\/script>\n    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"><\/script>\n    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"><\/script>\n    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"><\/script>\n    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"><\/script>\n    <style>\n        ::-webkit-scrollbar { width: 6px; height: 6px; }\n        ::-webkit-scrollbar-track { background: transparent; }\n        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }\n        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }\n        * { -webkit-tap-highlight-color: transparent; }\n        body { background-color: #f8fafc; }\n    </style>\n</head>\n<body>\n    <div id="root"></div>\n    <script type="text/babel">\n${reactCode}\n    <\/script>\n</body>\n</html>`;

                const blob = new Blob([htmlTemplate], { type: 'text/html;charset=utf-8' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "index.html";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const parseNumberOrEmpty = (val) => {
                if (val === undefined || val === null) return undefined;
                const s = String(val).trim();
                if (s === '') return undefined;
                const n = Number(s);
                return isNaN(n) ? undefined : n;
            };

            const calculateTBM = (txs, gk, ck) => {
                if (gk === undefined || ck === undefined) return null;
                const sumTX = txs.reduce((a, b) => a + b, 0);
                const totalWeight = txs.length + 5; 
                const tbm = (sumTX + gk*2 + ck*3) / totalWeight;
                return Math.round(tbm * 10) / 10;
            };

            const evaluateStudent = (grades, conductInput) => {
                const scoredGrades = grades.filter(g => typeof g.tbm === 'number' && !isNaN(g.tbm));
                const commentGrades = grades.filter(g => typeof g.ck === 'string' && (g.ck.toUpperCase() === 'Đ' || g.ck.toUpperCase() === 'CĐ'));

                const conduct = (conductInput || "Chưa xét").trim();
                if (scoredGrades.length === 0) return { result: "Chưa xét", conduct: conduct, title: "Không" };

                const tbms = scoredGrades.map(g => g.tbm);
                const comments = commentGrades.map(g => g.ck.toUpperCase());

                const isAllCommentsPass = comments.length > 0 && comments.every(c => c === 'Đ');
                const countCommentFail = comments.filter(c => c === 'CĐ').length;

                const countTBMGTE8 = tbms.filter(t => t >= 8.0).length;
                const countTBMGTE65 = tbms.filter(t => t >= 6.5).length;
                const countTBMGTE5 = tbms.filter(t => t >= 5.0).length;
                const minTBM = tbms.length > 0 ? Math.min(...tbms) : 0;

                let result = "Chưa đạt";
                let title = "Không";

                if (isAllCommentsPass && tbms.every(t => t >= 6.5) && countTBMGTE8 >= 6) result = "Tốt";
                else if (isAllCommentsPass && tbms.every(t => t >= 5.0) && countTBMGTE65 >= 6) result = "Khá";
                else if (countCommentFail <= 1 && countTBMGTE5 >= 6 && minTBM >= 3.5) result = "Đạt";

                if (conduct.toLowerCase() === 'tốt' && result === 'Tốt') {
                    const countTBMGTE9 = tbms.filter(t => t >= 9.0).length;
                    title = countTBMGTE9 >= 6 ? "Học sinh Xuất sắc" : "Học sinh Giỏi";
                }
                return { result, conduct, title };
            };

            const downloadTemplate = async () => {
                try {
                    setIsUploading(true);
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('BangDiem', { views: [{ state: 'frozen', xSplit: 6, ySplit: 1 }] });

                    const columns = [
                        { header: 'MaHS', key: 'mahs', width: 12 },
                        { header: 'Email', key: 'email', width: 30 },
                        { header: 'MatKhau', key: 'matkhau', width: 15 },
                        { header: 'HoTen', key: 'hoten', width: 28 },
                        { header: 'Lop', key: 'lop', width: 8 },
                        { header: 'RenLuyen', key: 'renluyen', width: 12 }
                    ];

                    subjectConfig.forEach(s => {
                        ['TX1', 'TX2', 'TX3', 'TX4', 'TX5', 'GK', 'CK'].forEach(t => {
                            const headerName = `${s.prefix}_${t}`;
                            columns.push({ header: headerName, width: headerName.length + 3 }); 
                        });
                    });

                    ['GDTC', 'NgheThuat', 'GDDP', 'HDTN'].forEach(h => {
                        columns.push({ header: h, width: Math.max(12, h.length + 3) });
                    });

                    sheet.columns = columns;

                    const headerRow = sheet.getRow(1);
                    headerRow.font = { bold: true };
                    headerRow.alignment = { horizontal: 'center', vertical: 'middle' };
                    headerRow.height = 25;

                    for(let i = 1; i <= 6; i++) {
                        headerRow.getCell(i).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD0CECE' } };
                    }
                    
                    let colIdx = 7;
                    subjectConfig.forEach(s => {
                        const argbColor = s.color.replace('#', 'FF'); 
                        for(let i = 0; i < 7; i++) {
                            headerRow.getCell(colIdx).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: argbColor } };
                            colIdx++;
                        }
                    });

                    for(let i = 0; i < 4; i++) {
                        headerRow.getCell(colIdx).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEDEDED' } };
                        colIdx++;
                    }

                    const sample1 = [
                        "HS001", "hs1@nhonphu.edu.vn", "123456", "Nguyễn Lê Phương Khánh", templateClass, "Tốt",
                        8,8,9,null,null,8,8.5, 8,8,8,9,null,9,8.5, 8,8,6,8,null,10,9.3, 10,9,8,10,null,9.8,8, 10,10,null,null,null,8,9.3, 10,9,null,null,null,9.5,10, 8,9,null,null,null,8,8.5, 7,7,null,null,null,7.5,7, "Đ", "Đ", "Đ", "Đ"
                    ];
                    
                    const sample2 = [
                        "HS002", "hs2@nhonphu.edu.vn", "123456", "Phạm Thị Thảo", templateClass, "Khá",
                        5,6,6,null,null,6.2,6.6, 7,8,8,null,null,8.5,7.8, 5,7,6,null,null,8.4,6, 9,9,5,null,null,8.3,8.5, 8,9,8,null,null,6.5,8.8, 8,10,null,null,null,9.8,8.5, 8,6,8,null,null,8.5,8.5, 5,6,null,null,null,5.5,5, "Đ", "Đ", "Đ", "Đ"
                    ];

                    [sample1, sample2].forEach(data => {
                        const row = sheet.addRow(data);
                        let dColIdx = 7;
                        subjectConfig.forEach(s => {
                            const argbColor = s.color.replace('#', 'FF');
                            for(let i = 0; i < 7; i++) {
                                row.getCell(dColIdx).alignment = { horizontal: 'center' };
                                row.getCell(dColIdx).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: argbColor } };
                                dColIdx++;
                            }
                        });
                        for(let i = 0; i < 4; i++) {
                            row.getCell(dColIdx).alignment = { horizontal: 'center' };
                            row.getCell(dColIdx).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEDEDED' } };
                            dColIdx++;
                        }
                    });

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `Mau_Nhap_Diem_${templateClass}.xlsx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    console.error(error);
                    alert("Lỗi tạo file.");
                } finally {
                    setIsUploading(false);
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);

                try {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        try {
                            const buffer = event.target.result;
                            const workbook = new window.ExcelJS.Workbook();
                            await workbook.xlsx.load(buffer);
                            
                            const worksheet = workbook.worksheets[0];
                            const parsedRows = [];
                            
                            worksheet.eachRow((row, rowNumber) => {
                                const rowData = [];
                                row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                                    let val = cell.value;
                                    if (val && typeof val === 'object') {
                                        if (val.richText) val = val.richText.map(rt => rt.text).join('');
                                        else if (val.result !== undefined) val = val.result;
                                    }
                                    rowData[colNumber - 1] = val ?? "";
                                });
                                parsedRows.push(rowData);
                            });
                            
                            const newStudents = [];
                            for (let i = 1; i < parsedRows.length; i++) {
                                const row = parsedRows[i];
                                if (!row || row.length < 3 || String(row[0]).trim() === "") continue; 
                                
                                let studentGrades = [];
                                subjectConfig.forEach(subj => {
                                    const txScores = [];
                                    for(let j = 0; j < 5; j++) {
                                        const score = parseNumberOrEmpty(row[subj.startCol + j]);
                                        if (score !== undefined) txScores.push(score);
                                    }
                                    const gk = parseNumberOrEmpty(row[subj.startCol + 5]);
                                    const ck = parseNumberOrEmpty(row[subj.startCol + 6]);
                                    let tbm = null;
                                    if (gk !== undefined && ck !== undefined) tbm = calculateTBM(txScores, gk, ck);
                                    
                                    studentGrades.push({ subject: subj.name, tx: txScores, gk: gk?gk:"", ck: ck?ck:"", tbm: tbm });
                                });

                                const passFailSubjects = ["Giáo dục thể chất", "Nghệ thuật", "Giáo dục địa phương", "Hoạt động trải nghiệm"];
                                passFailSubjects.forEach((subjName, idx) => {
                                    const val = row[62 + idx] ? String(row[62 + idx]).trim().toUpperCase() : "";
                                    studentGrades.push({ subject: subjName, tx: [], gk: "", ck: val, tbm: val });
                                });

                                const summary = evaluateStudent(studentGrades, String(row[5] || ""));

                                newStudents.push({
                                    id: String(row[0]).trim(), email: String(row[1]).trim(), password: String(row[2]).trim(), name: String(row[3]).trim(), class: String(row[4]).trim(),
                                    schoolYear: "2025 - 2026", semester: "Học kỳ 2",
                                    grades: studentGrades, summary: summary
                                });
                            }

                            if (newStudents.length === 0) { alert("Không tìm thấy dữ liệu hợp lệ!"); setIsUploading(false); return; }

                            if (db) {
                                const colRef = db.collection('students_data_2025');
                                for (const student of newStudents) {
                                    await colRef.doc(student.id).set(student);
                                }
                            } else {
                                // CHẾ ĐỘ DEMO: Lưu vào bộ nhớ đệm trình duyệt
                                setStudents(newStudents);
                                localStorage.setItem('thcs_nhonphu_data', JSON.stringify(newStudents));
                            }
                            
                            alert(`Hoàn tất cập nhật ${newStudents.length} học sinh.`);
                        } catch (error) {
                            alert("Lỗi đọc file Excel."); console.error(error);
                        } finally {
                            setIsUploading(false);
                            if (fileInputRef.current) fileInputRef.current.value = '';
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) {
                    alert("Lỗi thư viện."); setIsUploading(false);
                }
            };

            const handleDeleteStudent = async (id) => {
                if (window.confirm('Bạn có chắc chắn muốn xóa?')) {
                    if (db) {
                        await db.collection('students_data_2025').doc(id).delete();
                    } else {
                        // CHẾ ĐỘ DEMO
                        const updated = students.filter(s => s.id !== id);
                        setStudents(updated);
                        localStorage.setItem('thcs_nhonphu_data', JSON.stringify(updated));
                    }
                }
            };

            const classes = ['Tất cả', ...new Set((students || []).map(s => s.class))].sort();
            const filteredStudents = selectedClass === 'Tất cả' ? (students || []) : (students || []).filter(s => s.class === selectedClass);

            // GIAO DIỆN ĐĂNG NHẬP
            if (view === 'login') {
                return (
                    <div className="min-h-[100dvh] bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
                        <div className="max-w-md w-full bg-white sm:rounded-3xl rounded-2xl shadow-xl p-6 sm:p-8 border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg"><GraduationCap size={32} className="text-white" /></div>
                                <h1 className="text-2xl font-bold text-slate-900">THCS Nhơn Phú</h1>
                                <p className="text-slate-500 mt-1">Cổng thông tin & tra cứu điểm</p>
                                {!db && <p className="inline-block mt-2 px-3 py-1 bg-amber-100 text-amber-700 text-[11px] font-bold rounded-full">⚠️ Chế độ dùng thử Offline</p>}
                            </div>
                            <div className="flex p-1 bg-slate-100 rounded-2xl mb-8">
                                <button onClick={() => { setActiveTab('student'); setLoginError(''); }} className={`flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all ${activeTab === 'student' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>Học Sinh</button>
                                <button onClick={() => { setActiveTab('teacher'); setLoginError(''); }} className={`flex-1 py-2.5 text-sm font-semibold rounded-xl flex justify-center items-center gap-1 transition-all ${activeTab === 'teacher' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>Giáo Viên <ShieldCheck size={14} /></button>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                {activeTab === 'student' ? (
                                    <>
                                        <div className="relative">
                                            <div className="absolute left-4 top-3.5 text-slate-400"><User size={18} /></div>
                                            <input type="email" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Email (vd: hs1@nhonphu.edu.vn)" required />
                                        </div>
                                        <div className="relative mt-4">
                                            <div className="absolute left-4 top-3.5 text-slate-400"><ShieldCheck size={18} /></div>
                                            <input type="password" value={studentPasswordInput} onChange={(e) => setStudentPasswordInput(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Mật khẩu học sinh" required />
                                        </div>
                                    </>
                                ) : (
                                    <div className="relative">
                                        <div className="absolute left-4 top-3.5 text-slate-400"><ShieldCheck size={18} /></div>
                                        <input type="password" value={pinInput} onChange={(e) => setPinInput(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Mã PIN Giáo viên (Thử: 123456)" required />
                                    </div>
                                )}
                                {loginError && <p className="text-sm text-red-500 font-medium ml-1 bg-red-50 p-2 rounded-lg">{loginError}</p>}
                                <button type="submit" className="w-full py-3.5 text-white bg-blue-600 hover:bg-blue-700 rounded-2xl font-semibold transition-all shadow-md active:scale-95">
                                    {activeTab === 'student' ? 'Tra Cứu Điểm' : 'Quản Lý Dữ Liệu'}
                                </button>
                            </form>

                            <div className="mt-8 text-center border-t border-slate-100 pt-6">
                                <button type="button" onClick={downloadAppSource} className="text-sm text-slate-500 hover:text-blue-600 font-medium transition-colors flex items-center justify-center w-full gap-2 p-2 rounded-xl hover:bg-slate-50">
                                    <Download size={16} /> Tải Mã Nguồn (index.html) để Up Host
                                </button>
                                <div className="mt-4 text-xs text-slate-400">Năm học 2025 - 2026</div>
                            </div>
                        </div>
                    </div>
                );
            }

            // GIAO DIỆN GIÁO VIÊN
            if (view === 'admin_view') {
                return (
                    <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-0 sm:pb-12">
                        <header className="bg-slate-900 text-white h-16 flex items-center px-4 sm:px-6 justify-between sticky top-0 z-50 shadow-md">
                            <div className="font-bold flex items-center gap-2">
                                <ShieldCheck className="text-blue-400" size={24} />
                                <span className="hidden sm:inline">Portal Giáo Viên</span><span className="sm:hidden">Admin</span>
                                {!db && <span className="bg-amber-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-2">Demo Mode</span>}
                            </div>
                            <button onClick={handleLogout} className="text-sm bg-white/10 px-3 py-2 rounded-xl flex items-center gap-2 hover:bg-white/20 transition-colors"><LogOut size={16} /> Thoát</button>
                        </header>
                        <main className="max-w-6xl mx-auto px-0 sm:px-4 mt-0 sm:mt-8">
                            <div className="p-4 sm:p-0 flex flex-col md:flex-row justify-between items-start md:items-center mb-0 sm:mb-6 gap-4 bg-white sm:bg-transparent border-b sm:border-none">
                                <div>
                                    <h2 className="text-xl sm:text-2xl font-bold">Danh sách học sinh</h2>
                                    <p className="text-slate-500 text-xs sm:text-sm mt-1">Quản lý điểm 32 lớp (Năm 2025-2026)</p>
                                </div>
                                <div className="flex flex-col sm:flex-row w-full sm:w-auto gap-2">
                                    <div className="flex items-center bg-white border border-slate-200 text-slate-700 rounded-xl text-sm font-medium shadow-sm overflow-hidden w-full sm:w-auto focus-within:ring-2 ring-blue-500">
                                        <select value={templateClass} onChange={(e) => setTemplateClass(e.target.value)} className="flex-1 sm:w-auto px-3 py-2.5 outline-none bg-slate-50 border-r border-slate-200 text-slate-700 font-semibold appearance-none">
                                            {allClassesList.map(c => <option key={c} value={c}>Mẫu {c}</option>)}
                                        </select>
                                        <button onClick={downloadTemplate} disabled={isUploading} className="px-4 py-2.5 hover:bg-emerald-50 flex items-center justify-center gap-2 transition-colors text-emerald-600 font-bold bg-white min-w-[130px]">
                                            <FileSpreadsheet size={16} /> {isUploading ? 'Đang tạo...' : 'Tải Excel'}
                                        </button>
                                    </div>
                                    <input type="file" accept=".xlsx" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                    <button onClick={() => fileInputRef.current?.click()} disabled={isUploading} className="w-full sm:w-auto justify-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 shadow-sm transition-colors active:scale-95"><Upload size={16} /> Tải Lên Hệ Thống</button>
                                </div>
                            </div>

                            <div className="bg-white p-3 sm:p-2 sm:rounded-2xl shadow-sm border-b sm:border border-slate-100 sm:mb-6 flex gap-2 overflow-x-auto">
                                {classes.map(c => <button key={c} onClick={() => setSelectedClass(c)} className={`px-4 py-2 sm:py-1.5 rounded-xl whitespace-nowrap text-sm font-bold transition-all ${selectedClass === c ? 'bg-blue-100 text-blue-700' : 'text-slate-500 bg-slate-50 hover:bg-slate-100 border border-slate-200/60'}`}>{c}</button>)}
                            </div>

                            <div className="bg-white sm:rounded-3xl shadow-sm border-b sm:border border-slate-200 overflow-hidden">
                                <div className="overflow-x-auto w-full">
                                    <table className="w-full text-left whitespace-nowrap">
                                        <thead className="bg-slate-50">
                                            <tr>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">HS / Lớp</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">Họ Tên</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider text-center">Học tập</th>
                                                <th className="p-3 sm:p-4 text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-wider">Danh hiệu</th>
                                                <th className="p-3 sm:p-4"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredStudents.map(s => (
                                                <tr key={s.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-3 sm:p-4">
                                                        <div className="flex flex-col gap-1">
                                                            <span className="font-bold text-slate-800 text-sm">{s.id}</span>
                                                            <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md text-[10px] font-bold w-fit">{s.class}</span>
                                                        </div>
                                                    </td>
                                                    <td className="p-3 sm:p-4 font-semibold text-slate-800 text-sm">
                                                        {s.name}
                                                        <div className="text-[10px] sm:text-xs text-slate-400 font-normal">{s.email}</div>
                                                    </td>
                                                    <td className="p-3 sm:p-4 font-bold text-blue-600 text-center text-sm">{s.summary?.result}</td>
                                                    <td className="p-3 sm:p-4 text-sm text-amber-600 font-bold">{s.summary?.title}</td>
                                                    <td className="p-3 sm:p-4 text-right">
                                                        <button onClick={() => handleDeleteStudent(s.id)} className="text-slate-400 p-2 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18}/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredStudents.length === 0 && (
                                                <tr><td colSpan="5" className="p-8 text-center text-slate-500">Chưa có dữ liệu học sinh nào. Hãy Tải File Excel Mẫu về và Tải Lên Hệ Thống.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // GIAO DIỆN HỌC SINH
            const user = currentStudentData;
            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-0 sm:pb-12">
                    <header className="bg-white shadow-sm h-16 flex items-center px-4 sm:px-6 justify-between sticky top-0 z-50">
                        <div className="font-bold flex items-center gap-2"><GraduationCap className="text-blue-600" size={24}/><span className="text-lg">THCS Nhơn Phú</span></div>
                        <button onClick={handleLogout} className="text-sm font-bold text-slate-500 hover:text-red-500 flex items-center gap-2 transition-colors bg-slate-50 px-3 py-1.5 rounded-full border"><LogOut size={16} /> <span className="hidden sm:inline">Đăng xuất</span></button>
                    </header>
                    <main className="max-w-5xl mx-auto px-0 sm:px-4 mt-0 sm:mt-8">
                        <div className="bg-white sm:rounded-3xl p-5 sm:p-8 shadow-sm border-b sm:border border-slate-200 mb-2 sm:mb-6 flex flex-col md:flex-row gap-5 items-start md:items-center justify-between">
                            <div className="flex items-center gap-4 w-full">
                                <div className="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-md shrink-0 border-2 border-white">{user.name.charAt(0)}</div>
                                <div className="flex-1">
                                    <h2 className="text-xl sm:text-3xl font-bold mb-1 leading-tight text-slate-900">{user.name}</h2>
                                    <p className="text-slate-500 text-xs sm:text-sm font-semibold flex items-center gap-1.5 flex-wrap">
                                        <span className="bg-slate-100 px-2 py-0.5 rounded flex items-center gap-1"><User size={12}/> Lớp: {user.class}</span> 
                                        <span className="bg-slate-100 px-2 py-0.5 rounded">HK2 (2025-2026)</span>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-3 gap-2 w-full md:w-auto">
                                <div className="bg-slate-50 p-3 rounded-2xl border border-slate-200 text-center">
                                    <p className="text-[10px] text-slate-500 font-bold mb-0.5 uppercase">Rèn luyện</p>
                                    <p className="text-base sm:text-xl font-bold text-slate-800">{user.summary.conduct}</p>
                                </div>
                                <div className="bg-blue-50 p-3 rounded-2xl border border-blue-100 text-center">
                                    <p className="text-[10px] text-blue-600 font-bold mb-0.5 uppercase">Học tập</p>
                                    <p className="text-base sm:text-xl font-bold text-blue-700">{user.summary.result}</p>
                                </div>
                                <div className="bg-amber-50 p-3 rounded-2xl border border-amber-100 text-center flex flex-col justify-center">
                                    <p className="text-[10px] text-amber-600 font-bold mb-0.5 uppercase">Danh hiệu</p>
                                    <p className="text-sm font-bold text-amber-700 leading-tight">{user.summary.title}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div className="bg-white sm:rounded-3xl shadow-sm sm:border border-slate-200 overflow-hidden">
                            <div className="p-4 border-b bg-slate-50/80 flex items-center gap-2">
                                <Activity className="text-blue-600" size={18}/>
                                <span className="font-bold text-slate-800">Bảng điểm chi tiết</span>
                            </div>
                            <div className="overflow-x-auto w-full">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-white border-b border-slate-100">
                                        <tr>
                                            <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase">Môn học</th>
                                            <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase">Đ.Thường xuyên</th>
                                            <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase text-center">G.Kỳ</th>
                                            <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-slate-500 uppercase text-center">C.Kỳ</th>
                                            <th className="p-3 sm:p-4 text-[11px] sm:text-sm font-bold text-blue-600 uppercase text-center bg-blue-50/50">TBM</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {user.grades?.map((g, i) => (
                                            <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="p-3 sm:p-4 font-bold text-xs sm:text-sm text-slate-800">{g.subject}</td>
                                                <td className="p-3 sm:p-4">
                                                    <div className="flex flex-wrap gap-1">
                                                        {g.tx?.map((sc, idx) => <span key={idx} className="px-1.5 py-0.5 bg-slate-100 text-slate-700 rounded text-xs sm:text-sm font-bold border border-slate-200/50">{sc}</span>)}
                                                    </div>
                                                </td>
                                                <td className="p-3 sm:p-4 text-center text-xs sm:text-sm font-bold text-slate-700">{g.gk}</td>
                                                <td className="p-3 sm:p-4 text-center text-xs sm:text-sm font-bold text-slate-700">{g.ck}</td>
                                                <td className={`p-3 sm:p-4 text-center text-xs sm:text-sm font-black bg-blue-50/30 ${g.tbm === 'Đ' ? 'text-emerald-600' : g.tbm === 'CĐ' ? 'text-red-500' : 'text-blue-700'}`}>
                                                    {g.tbm !== null ? g.tbm : '-'}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <div className="p-3 text-[10px] sm:text-xs text-slate-400 text-center border-t border-slate-100 bg-slate-50 uppercase font-semibold tracking-wide">
                                Đánh giá theo Thông tư 22/2021/TT-BGDĐT
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
    </script>
</body>
</html>
